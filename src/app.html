<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    %sveltekit.head%
    <script>
      (function () {
        try {
          var t = localStorage.getItem('mode-watcher-mode') || 'system';
          var dark =
            t === 'dark' ||
            (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
        try {
          // Pre-paint viewport hint so the app can render in its final layout
          // (e.g. mobile drawer collapsed) without a visible "ghost" transition.
          if (window.matchMedia('(max-width: 768px)').matches) {
            document.documentElement.classList.add('mobile-viewport');
          }
          // Suppress transitions during initial hydration; cleared by the app
          // shortly after mount.
          document.documentElement.classList.add('app-init');
        } catch (e) {}
      })();
    </script>
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
<!doctype html>
