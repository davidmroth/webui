services:
  webui:
    build:
      context: .
      dockerfile: service/frontend/Dockerfile
      target: runtime-deps
    restart: always
    command: yarn dev
    working_dir: /app
    ports:
      - "${WEBUI_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      OBJECT_STORAGE_ENDPOINT: minio
      OBJECT_STORAGE_PORT: 9000
      BODY_SIZE_LIMIT: ${BODY_SIZE_LIMIT:-10M}
      HERMES_WEBCHAT_SERVICE_TOKEN: ${HERMES_WEBCHAT_SERVICE_TOKEN}
      DIAGNOSTICS_TOKEN: ${DIAGNOSTICS_TOKEN:-}
      DIAGNOSTICS_RING_BUFFER_SIZE: ${DIAGNOSTICS_RING_BUFFER_SIZE:-1000}
      DIAGNOSTICS_STALE_CHECK_INTERVAL_SECONDS: ${DIAGNOSTICS_STALE_CHECK_INTERVAL_SECONDS:-15}
    volumes:
      - ./service/frontend:/app
      - webui_node_modules:/app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - ./mysql/init:/docker-entrypoint-initdb.d
      - .data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - .data/minio:/data

  # phpMyAdmin — database admin UI.
  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "${PHPMYADMIN_PORT:-8888}:80"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  webui_node_modules:
